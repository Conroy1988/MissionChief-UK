name: Refresh official UK mission catalogue

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: official-uk-mission-catalogue-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate catalogue tooling
        run: |
          python -m py_compile scripts/import_official_uk_missions.py
          python -m py_compile scripts/publish_official_mission_catalogue.py
          python -m py_compile scripts/compact_official_mission_catalogue.py
          python -m py_compile scripts/reconcile_official_mission_coverage.py
          python -m py_compile scripts/verification_registry.py
          python -m py_compile scripts/merge_verification_registry_batches.py
          python -m py_compile scripts/validate_official_mission_catalogue.py
          python -m py_compile scripts/validate_official_key_mappings.py
          python -m py_compile scripts/validate_official_patient_mappings.py
          python -m py_compile scripts/validate_official_personnel_mappings.py
          python -m py_compile scripts/validate_official_personnel_education_mappings.py
          python -m py_compile scripts/validate_official_prisoner_mappings.py
          python -m py_compile scripts/validate_official_recovery_mappings.py
          python -m py_compile scripts/report_canonical_candidates.py
          python -m py_compile scripts/report_key_mapping_backlog.py
          python -m py_compile scripts/generate_mission_verification_status.py
          python -m py_compile scripts/validate_verification_programme_assets.py

      - name: Download and reconcile official UK missions
        run: python scripts/import_official_uk_missions.py

      - name: Publish browser catalogue
        run: python scripts/publish_official_mission_catalogue.py

      - name: Compact tracked catalogue files
        run: python scripts/compact_official_mission_catalogue.py

      - name: Reconcile official/canonical mission coverage
        run: python scripts/reconcile_official_mission_coverage.py

      - name: Audit refreshed official catalogue
        run: python scripts/validate_official_mission_catalogue.py

      - name: Merge mission verification batch registries
        run: python scripts/merge_verification_registry_batches.py

      - name: Audit official-to-canonical key mappings
        run: python scripts/validate_official_key_mappings.py

      - name: Audit official patient mappings
        run: python scripts/validate_official_patient_mappings.py

      - name: Audit official personnel mappings
        run: python scripts/validate_official_personnel_mappings.py

      - name: Audit official personnel education mappings
        run: python scripts/validate_official_personnel_education_mappings.py

      - name: Audit official prisoner mappings
        run: python scripts/validate_official_prisoner_mappings.py

      - name: Audit official recovery mappings
        run: python scripts/validate_official_recovery_mappings.py

      - name: Run catalogue reporting unit tests
        run: python -m unittest discover -s tests/python -p 'test_*.py'

      - name: Report next evidence-safe canonical candidates
        run: python scripts/report_canonical_candidates.py --limit 50

      - name: Report official key mapping backlog
        run: python scripts/report_key_mapping_backlog.py --limit 50 --examples 5

      - name: Regenerate 100% mission verification backlog
        run: python scripts/generate_mission_verification_status.py

      - name: Validate mission verification programme assets
        run: python scripts/validate_verification_programme_assets.py

      - name: Commit source changes only
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/sources/missionchief-uk docs/assets/data/official docs/reference/mission-verification-status.md

          if git diff --cached --quiet; then
            echo "Official UK mission source and verification backlog are unchanged; no commit is required."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          checked_out=$(git rev-parse HEAD)
          git fetch origin main
          current_main=$(git rev-parse origin/main)
          if [ "$checked_out" != "$current_main" ]; then
            echo "main moved from $checked_out to $current_main during refresh; rerun against the new baseline."
            exit 1
          fi

          git commit -m "Refresh official UK mission catalogue"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy refreshed catalogue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
