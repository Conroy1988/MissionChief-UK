name: Validate guide

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install documentation dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate JSON documents
        run: python scripts/validate_data.py
      - name: Generate public data exports
        run: python scripts/generate_exports.py
      - name: Generate FAQ
        run: python scripts/generate_faq.py
      - name: Build documentation strictly
        run: python -m mkdocs build --strict
