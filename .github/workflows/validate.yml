name: Validate guide

# Validate the corrected 54-mission canonical baseline and generate the next evidence backlog.
on:
  push:
    branches:
      - main
      - feature/uk-mission-catalogue-expansion
      - validation/canonical-batch-4
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate canonical JSON documents
        run: python scripts/validate_data.py

      - name: Reconcile official/canonical mission coverage
        run: python scripts/reconcile_official_mission_coverage.py

      - name: Validate official UK mission catalogue
        run: python scripts/validate_official_mission_catalogue.py

      - name: Merge mission verification batch registries
        run: python scripts/merge_verification_registry_batches.py

      - name: Report all promoted mapping failures
        shell: bash
        run: |
          set -o pipefail
          python scripts/report_promoted_mapping_failures.py 2>&1 | tee key-mapping-validation.log

      - name: Upload key mapping diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: key-mapping-validation-diagnostics
          path: key-mapping-validation.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Validate official-to-canonical key mappings
        run: python scripts/validate_official_key_mappings.py

      - name: Validate official patient mappings
        run: python scripts/validate_official_patient_mappings.py

      - name: Validate official personnel mappings
        run: python scripts/validate_official_personnel_mappings.py

      - name: Validate official personnel education mappings
        run: python scripts/validate_official_personnel_education_mappings.py

      - name: Validate official prisoner mappings
        run: python scripts/validate_official_prisoner_mappings.py

      - name: Validate official recovery mappings
        run: python scripts/validate_official_recovery_mappings.py

      - name: Run catalogue reporting unit tests
        run: python -m unittest discover -s tests/python -p 'test_catalogue_reporting.py'

      - name: Report next evidence-safe canonical candidates
        run: |
          python scripts/report_canonical_candidates.py --limit 200 > canonical-candidates.json
          cat canonical-candidates.json

      - name: Upload canonical candidate report
        uses: actions/upload-artifact@v4
        with:
          name: canonical-candidates
          path: canonical-candidates.json
          if-no-files-found: error
          retention-days: 14

      - name: Report official key mapping backlog
        run: |
          python scripts/report_key_mapping_backlog.py --limit 200 --examples 10 > key-mapping-backlog.json
          cat key-mapping-backlog.json

      - name: Upload official key mapping backlog
        uses: actions/upload-artifact@v4
        with:
          name: key-mapping-backlog
          path: key-mapping-backlog.json
          if-no-files-found: error
          retention-days: 14

      - name: Generate 100% mission verification status
        run: python scripts/generate_mission_verification_status.py

      - name: Validate mission verification programme assets
        run: python scripts/validate_verification_programme_assets.py

      - name: Generate public data exports
        run: python scripts/generate_exports.py

      - name: Generate FAQ
        run: python scripts/generate_faq.py

      - name: Run release-integrity regressions
        run: python -m unittest discover -s tests/python -p "test_release_integrity.py"

      - name: Audit repository and generated API
        shell: bash
        run: |
          set -o pipefail
          python scripts/release_readiness.py 2>&1 | tee release-readiness.log

      - name: Upload release-readiness diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-diagnostics
          path: release-readiness.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Test documentation link auditor
        run: python -m unittest tests/test_audit_links.py

      - name: Audit documentation links and anchors
        run: python scripts/audit_links.py

      - name: Build documentation strictly
        run: python -m mkdocs build --strict --site-dir site

      - name: Audit built site
        run: python scripts/release_readiness.py --site-dir site

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install browser-test dependencies
        run: npm install --no-audit --no-fund

      - name: Validate all JavaScript syntax
        shell: bash
        run: |
          for file in docs/javascripts/*.js; do
            node --check "$file"
          done

      - name: Install Chromium and WebKit for Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser acceptance tests against built site
        shell: bash
        run: |
          python -m http.server 8000 --directory site > /tmp/missionchief-uk-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/missionchief-uk-http.log
              exit 1
            fi
            sleep 1
          done

          MCUK_BASE_URL=http://127.0.0.1:8000/ \
            npm run test:e2e -- --project=chromium-desktop
          MCUK_BASE_URL=http://127.0.0.1:8000/ \
            npm run test:e2e -- \
              tests/e2e/live-site.spec.mjs \
              --project=webkit-iphone \
              --grep "tools/resource-comparison/ renders without runtime or viewport failures"

      - name: Upload browser-test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-playwright-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
