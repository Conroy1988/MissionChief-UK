name: Validate guide

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate JSON documents
        run: python scripts/validate_data.py

      - name: Generate public data exports
        run: python scripts/generate_exports.py

      - name: Generate FAQ
        run: python scripts/generate_faq.py

      - name: Audit repository and generated API
        run: python scripts/release_readiness.py

      - name: Audit documentation links and anchors
        run: python scripts/audit_links.py

      - name: Build documentation strictly
        run: python -m mkdocs build --strict --site-dir site

      - name: Audit built site
        run: python scripts/release_readiness.py --site-dir site

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install browser-test dependencies
        run: npm install --no-audit --no-fund

      - name: Validate all JavaScript syntax
        shell: bash
        run: |
          for file in docs/javascripts/*.js; do
            node --check "$file"
          done

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Chromium acceptance tests against built site
        shell: bash
        run: |
          python -m http.server 8000 --directory site > /tmp/missionchief-uk-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/missionchief-uk-http.log
              exit 1
            fi
            sleep 1
          done

          MCUK_BASE_URL=http://127.0.0.1:8000/ npm run test:e2e -- --project=chromium-desktop

      - name: Upload browser-test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-playwright-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
