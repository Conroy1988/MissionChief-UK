name: Publish MissionChief UK release

on:
  workflow_run:
    workflows: ["Deploy MissionChief UK Guide"]
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: missionchief-uk-release
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the successfully deployed commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify exact deployed commit
        env:
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          current_commit=$(git rev-parse HEAD)
          if [ "$current_commit" != "$DEPLOYED_SHA" ]; then
            echo "Checked-out commit $current_commit does not match deployed commit $DEPLOYED_SHA"
            exit 1
          fi

      - name: Read and validate release metadata
        id: metadata
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          release = json.loads(Path("data/version.json").read_text(encoding="utf-8"))
          version = release.get("version")
          if not isinstance(version, str) or re.fullmatch(r"1\.\d+\.\d+", version) is None:
              raise SystemExit("Release version must be a valid v1 semantic version")
          if release.get("stage") != 34:
              raise SystemExit("Release metadata must identify Stage 34")
          if release.get("status") != "production":
              raise SystemExit("Release metadata status must be production")

          notes = Path("docs") / "releases" / f"v{version}.md"
          if not notes.is_file():
              raise SystemExit(f"Release notes are missing: {notes}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"tag=v{version}\n")
              output.write(f"notes={notes.as_posix()}\n")
          PY

      - name: Verify any existing immutable release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          if ! release_state=$(gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease \
            --jq '[.tagName, (.isDraft | tostring), (.isPrerelease | tostring)] | @tsv' \
            2>/dev/null); then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS=$'\t' read -r release_tag is_draft is_prerelease <<< "$release_state"
          if [ "$release_tag" != "$TAG" ]; then
            echo "Existing release resolves tag $release_tag instead of $TAG"
            exit 1
          fi
          if [ "$is_draft" != "false" ] || [ "$is_prerelease" != "false" ]; then
            echo "Existing release $TAG must be published and must not be a prerelease"
            exit 1
          fi

          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          tag_type=$(git cat-file -t "refs/tags/$TAG")
          if [ "$tag_type" != "tag" ]; then
            echo "Existing release tag $TAG must be an immutable annotated tag"
            exit 1
          fi
          tagged_commit=$(git rev-parse "$TAG^{commit}")
          if ! git merge-base --is-ancestor "$tagged_commit" HEAD; then
            echo "Existing release tag $TAG targets $tagged_commit outside the deployed main history"
            exit 1
          fi

          successful_pages_runs=$(gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/deploy-pages.yml/runs" \
            -f head_sha="$tagged_commit" \
            -f status=success \
            -f per_page=100 \
            --jq "[.workflow_runs[] | select(.head_sha == \"$tagged_commit\" and .head_branch == \"main\" and .conclusion == \"success\")] | length")
          if [ "$successful_pages_runs" -lt 1 ]; then
            echo "Existing release tag $TAG targets $tagged_commit without a successful full Pages run"
            exit 1
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Release $TAG is published, immutable, and backed by a successful Pages run at $tagged_commit."

      - name: Set up Python
        if: steps.existing.outputs.exists != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        if: steps.existing.outputs.exists != 'true'
        run: python -m pip install -r requirements.txt

      - name: Validate canonical structured data
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_data.py

      - name: Reconcile official/canonical mission coverage
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/reconcile_official_mission_coverage.py

      - name: Validate official UK mission catalogue
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_mission_catalogue.py

      - name: Merge mission verification batch registries
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/merge_verification_registry_batches.py

      - name: Validate official-to-canonical key mappings
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_key_mappings.py

      - name: Validate official patient mappings
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_patient_mappings.py

      - name: Validate official personnel mappings
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_personnel_mappings.py

      - name: Validate official personnel education mappings
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_personnel_education_mappings.py

      - name: Validate official prisoner mappings
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_prisoner_mappings.py

      - name: Validate official recovery mappings
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_official_recovery_mappings.py

      - name: Run catalogue reporting unit tests
        if: steps.existing.outputs.exists != 'true'
        run: python -m unittest discover -s tests/python -p 'test_*.py'

      - name: Generate 100% mission verification status
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/generate_mission_verification_status.py

      - name: Validate mission verification programme assets
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/validate_verification_programme_assets.py

      - name: Generate public data exports
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/generate_exports.py

      - name: Generate FAQ
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/generate_faq.py

      - name: Audit repository and generated API
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/release_readiness.py

      - name: Audit documentation links and anchors
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/audit_links.py

      - name: Validate all JavaScript syntax
        if: steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          for file in docs/javascripts/*.js; do
            node --check "$file"
          done

      - name: Build documentation strictly
        if: steps.existing.outputs.exists != 'true'
        run: python -m mkdocs build --strict --site-dir site

      - name: Audit built site
        if: steps.existing.outputs.exists != 'true'
        run: python scripts/release_readiness.py --site-dir site

      - name: Create immutable tag and GitHub Release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          NOTES: ${{ steps.metadata.outputs.notes }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG^{commit}" >/dev/null 2>&1; then
            tagged_commit=$(git rev-parse "$TAG^{commit}")
            current_commit=$(git rev-parse HEAD)
            if [ "$tagged_commit" != "$current_commit" ]; then
              echo "Tag $TAG already points to $tagged_commit instead of deployed commit $current_commit"
              exit 1
            fi
          else
            git tag -a "$TAG" -m "MissionChief UK $TAG"
            git push origin "$TAG"
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "MissionChief UK v$VERSION" \
            --notes-file "$NOTES"
