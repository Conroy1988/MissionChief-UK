    <rect width="844" height="94" rx="18" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(28 18)"><text x="0" y="31" fill="#5bc5ff" font-size="34" font-weight="900">62</text><text x="0" y="57" fill="#aab9c8" font-size="12" font-weight="700" letter-spacing="1.3">MISSIONS</text></g>
    <line x1="185" y1="20" x2="185" y2="74" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(215 18)"><text x="0" y="31" fill="#75d4ff" font-size="34" font-weight="900">46</text><text x="0" y="57" fill="#aab9c8" font-size="12" font-weight="700" letter-spacing="1.3">RESOURCES</text></g>
    <line x1="390" y1="20" x2="390" y2="74" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(420 18)"><text x="0" y="31" fill="#f3f7fb" font-size="34" font-weight="900">18</text><text x="0" y="57" fill="#aab9c8" font-size="12" font-weight="700" letter-spacing="1.3">INFRASTRUCTURE</text></g>
    <line x1="625" y1="20" x2="625" y2="74" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="translate(655 18)"><text x="0" y="31" fill="#ff717b" font-size="34" font-weight="900">11</text><text x="0" y="57" fill="#aab9c8" font-size="12" font-weight="700" letter-spacing="1.3">QUALIFICATIONS</text></g>
  </g>

  <g transform="translate(1045 50)" filter="url(#shadow)">
    <rect width="475" height="448" rx="28" fill="#071421" fill-opacity="0.88" stroke="#73cfff" stroke-opacity="0.24"/>
    <rect x="22" y="22" width="431" height="404" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="42" y="58" fill="#90a7ba" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" letter-spacing="2.3">LIVE COMMAND POSTURE</text>
    <text x="430" y="58" text-anchor="end" fill="#7fd5ff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="800">v1.0.0 · STAGE 34</text>

    <g transform="translate(237 220)">
      <circle r="132" fill="#0a1b2c" stroke="#50bfff" stroke-opacity="0.24" stroke-width="2"/>
      <circle r="98" fill="none" stroke="#74ceff" stroke-opacity="0.28" stroke-dasharray="6 8"/>
      <circle r="64" fill="none" stroke="#e85864" stroke-opacity="0.26" stroke-dasharray="3 7"/>
      <path d="M-132 0H132M0-132V132" stroke="#75ceff" stroke-opacity="0.16"/>
      <path d="M-93-93 93 93M93-93-93 93" stroke="#75ceff" stroke-opacity="0.08"/>
      <path d="M0-112A112 112 0 0 1 97-56" fill="none" stroke="#42bdff" stroke-width="5" stroke-linecap="round"/>
      <path d="M97 56A112 112 0 0 1 0 112" fill="none" stroke="#e94a58" stroke-width="5" stroke-linecap="round"/>
      <path d="M0-49 43-24v48L0 49-43 24v-48Z" fill="#102c45" stroke="url(#edge)" stroke-width="3"/>
      <text x="0" y="11" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="31" font-weight="900">UK</text>
      <circle cx="97" cy="-56" r="7" fill="#4cc4ff"/>
      <circle cx="-78" cy="80" r="7" fill="#ff5d68"/>
      <circle cx="-104" cy="-28" r="5" fill="#dcefff"/>
      <circle cx="76" cy="85" r="5" fill="#dcefff"/>
    </g>

    <g font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" letter-spacing="1.4">
      <text x="48" y="393" fill="#74ceff">SEARCH</text>
      <text x="191" y="393" fill="#e8f5fc">PLAN</text>
      <text x="322" y="393" fill="#ff6d78">VERIFY</text>
      <circle cx="121" cy="389" r="3" fill="#587084"/>
      <circle cx="270" cy="389" r="3" fill="#587084"/>
    </g>
  </g>

  <rect x="0" y="548" width="800" height="12" rx="6" fill="#2aaeff"/>
  <rect x="800" y="548" width="800" height="12" rx="6" fill="#d63345"/>
</svg>
