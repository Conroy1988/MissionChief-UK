<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">MissionChief UK Operations Intelligence Platform</title>
  <desc id="desc">A high-detail emergency command centre banner presenting the MissionChief UK verified data platform, intelligence tools and static API.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040913"/>
      <stop offset="0.46" stop-color="#0a1c2f"/>
      <stop offset="0.72" stop-color="#101b2c"/>
      <stop offset="1" stop-color="#17090f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2eb5ff"/>
      <stop offset="0.48" stop-color="#78d2ff"/>
      <stop offset="0.52" stop-color="#ff777f"/>
      <stop offset="1" stop-color="#d63345"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <radialGradient id="blueGlow">
      <stop offset="0" stop-color="#3cbcff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#3cbcff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow">
      <stop offset="0" stop-color="#ee4051" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ee4051" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#a8dcff" stroke-opacity="0.045"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.42"/></filter>
  </defs>

  <rect width="1600" height="560" rx="30" fill="url(#bg)"/>
  <rect width="1600" height="560" rx="30" fill="url(#grid)"/>
  <circle cx="170" cy="90" r="250" fill="url(#blueGlow)" filter="url(#blur)"/>
  <circle cx="1450" cy="490" r="300" fill="url(#redGlow)" filter="url(#blur)"/>
  <rect x="1.5" y="1.5" width="1597" height="557" rx="28.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>

  <g opacity="0.28">
    <path d="M0 432C220 360 355 468 560 396S910 328 1110 408s314 36 490-44" fill="none" stroke="#3fbaff" stroke-width="3"/>
    <path d="M0 456c242-70 370 35 584-32s340-62 543 17 309 39 473-22" fill="none" stroke="#e94a58" stroke-width="2"/>
  </g>

  <g transform="translate(74 58)">
    <rect width="348" height="38" rx="19" fill="#0c253b" stroke="#3eb8ff" stroke-opacity="0.55"/>
    <circle cx="20" cy="19" r="6" fill="#4cc4ff"/>
    <circle cx="20" cy="19" r="12" fill="none" stroke="#4cc4ff" stroke-opacity="0.26"/>
    <text x="42" y="25" fill="#bfeaff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="2.1">UNITED KINGDOM · OPERATIONS INTELLIGENCE</text>
  </g>

  <text x="74" y="182" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="72" font-weight="900" letter-spacing="2">MISSIONCHIEF UK</text>
  <text x="78" y="235" fill="#82d5ff" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="750" letter-spacing="7">COMMAND INTELLIGENCE PLATFORM</text>
  <text x="78" y="287" fill="#dce9f2" font-family="Segoe UI,Arial,sans-serif" font-size="21">Verified operational data · Interactive planning tools · Versioned static API</text>

  <g transform="translate(78 321)" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1">
    <rect width="178" height="42" rx="9" fill="#0d293f" stroke="#3eb8ff" stroke-opacity="0.55"/><text x="25" y="27" fill="#d9f3ff">VERIFIED DATA</text>
    <rect x="194" width="190" height="42" rx="9" fill="#112538" stroke="#6bcaff" stroke-opacity="0.42"/><text x="219" y="27" fill="#d9f3ff">INTELLIGENCE TOOLS</text>
    <rect x="400" width="158" height="42" rx="9" fill="#28151c" stroke="#e95360" stroke-opacity="0.52"/><text x="428" y="27" fill="#ffe1e4">STATIC API v1</text>
  </g>

