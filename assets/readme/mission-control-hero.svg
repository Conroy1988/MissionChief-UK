<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">MissionChief UK Command Knowledge Centre</title>
  <desc id="desc">Dark emergency command centre banner with a UK operations theme, map grid, blue and red response lights, and project mission statement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0b1d31"/>
      <stop offset="1" stop-color="#050a12"/>
    </linearGradient>
    <radialGradient id="blueGlow">
      <stop offset="0" stop-color="#52b9ff" stop-opacity=".85"/>
      <stop offset="1" stop-color="#1a74c9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow">
      <stop offset="0" stop-color="#ff4a57" stop-opacity=".78"/>
      <stop offset="1" stop-color="#c92538" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#79b7e8" stroke-opacity=".09" stroke-width="1"/>
    </pattern>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1400" height="420" rx="24" fill="url(#bg)"/>
  <rect width="1400" height="420" rx="24" fill="url(#grid)"/>
  <circle cx="140" cy="90" r="180" fill="url(#blueGlow)" filter="url(#soft)" opacity=".65"/>
  <circle cx="1260" cy="335" r="210" fill="url(#redGlow)" filter="url(#soft)" opacity=".5"/>
  <path d="M70 320 C220 260 310 360 460 300 S760 230 910 292 S1170 365 1330 270" fill="none" stroke="#4ca8e8" stroke-opacity=".22" stroke-width="3"/>
  <path d="M70 337 C240 280 335 377 485 319 S770 250 932 310 S1175 383 1330 292" fill="none" stroke="#f55b66" stroke-opacity=".15" stroke-width="2"/>
  <g transform="translate(80 63)">
    <rect width="174" height="34" rx="17" fill="#0f2d49" stroke="#2f7db8"/>
    <circle cx="20" cy="17" r="5" fill="#4fc3ff"/>
    <text x="34" y="22" fill="#bfe8ff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.8">UK OPERATIONS</text>
  </g>
  <text x="80" y="162" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="63" font-weight="800" letter-spacing="2">MISSIONCHIEF UK</text>
  <text x="82" y="218" fill="#8fd0ff" font-family="Segoe UI,Arial,sans-serif" font-size="28" font-weight="650" letter-spacing="5">COMMAND KNOWLEDGE CENTRE</text>
  <text x="82" y="270" fill="#d5e2ec" font-family="Segoe UI,Arial,sans-serif" font-size="21">Intelligence · Strategy · Reference Data · Scripts · Community Knowledge</text>
  <g transform="translate(82 315)" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700">
    <rect width="155" height="38" rx="8" fill="#10283d" stroke="#2e6d99"/><text x="20" y="24" fill="#d9f0ff">SEARCHABLE</text>
    <rect x="170" width="155" height="38" rx="8" fill="#10283d" stroke="#2e6d99"/><text x="196" y="24" fill="#d9f0ff">EVIDENCE-LED</text>
    <rect x="340" width="155" height="38" rx="8" fill="#10283d" stroke="#2e6d99"/><text x="368" y="24" fill="#d9f0ff">UK FOCUSED</text>
  </g>
  <g transform="translate(1030 65)">
    <circle cx="110" cy="110" r="94" fill="#071421" stroke="#255b82" stroke-width="2"/>
    <circle cx="110" cy="110" r="72" fill="none" stroke="#4ba9e8" stroke-opacity=".38" stroke-width="2" stroke-dasharray="7 8"/>
    <path d="M110 44V176M44 110H176" stroke="#78c8ff" stroke-opacity=".26"/>
    <path d="M110 71l16 31 34 5-25 24 6 34-31-16-31 16 6-34-25-24 34-5z" fill="#173e5d" stroke="#61b9f3" stroke-width="2"/>
    <circle cx="110" cy="110" r="10" fill="#69c5ff"/>
    <text x="110" y="236" text-anchor="middle" fill="#d8e9f5" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="2">CONTROL · RESPOND · LEARN</text>
  </g>
  <rect x="0" y="408" width="700" height="12" rx="6" fill="#2589ce"/>
  <rect x="700" y="408" width="700" height="12" rx="6" fill="#d63243"/>
</svg>