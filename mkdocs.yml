site_name: MissionChief UK — Operations Intelligence Platform
site_description: Independent verified command knowledgebase, planning suite and static data API for MissionChief UK
site_url: https://conroy1988.github.io/MissionChief-UK/
repo_url: https://github.com/Conroy1988/MissionChief-UK
repo_name: Conroy1988/MissionChief-UK
edit_uri: edit/main/docs/

copyright: Independent community project. MissionChief and associated assets belong to their respective owners.

extra_css:
  - stylesheets/extra.css
  - stylesheets/command-palette.css
  - stylesheets/home-responsive.css

extra_javascript:
  - javascripts/home-command.js
  - javascripts/intelligence-tools.js
  - javascripts/tool-deep-links.js
  - javascripts/command-palette.js

theme:
  name: material
  language: en
  logo: assets/brand/command-mark.svg
  favicon: assets/brand/command-mark.svg
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark command mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light command mode

plugins:
  - search:
      lang: en
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Conroy1988/MissionChief-UK
      name: MissionChief UK on GitHub
    - icon: fontawesome/solid/globe
      link: https://conroy1988.github.io/MissionChief-UK/
      name: MissionChief UK Command Centre

