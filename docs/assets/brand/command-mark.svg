<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">MissionChief UK command mark</title>
  <desc id="desc">A blue and red emergency operations radar mark containing the letters UK.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#102b45"/>
      <stop offset="1" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35b6ff"/>
      <stop offset="0.5" stop-color="#7dd9ff"/>
      <stop offset="0.501" stop-color="#ff6a72"/>
      <stop offset="1" stop-color="#d63345"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#62c7ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#62c7ff" stop-opacity="0"/>
    </radialGradient>
