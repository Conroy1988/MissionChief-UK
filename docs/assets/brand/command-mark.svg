  <circle cx="64" cy="64" r="34" fill="none" stroke="#8cd9ff" stroke-opacity="0.35" stroke-dasharray="4 6"/>
  <path d="M64 18v92M18 64h92" stroke="#8bd8ff" stroke-opacity="0.18"/>
  <path d="M64 27a37 37 0 0 1 32 18" fill="none" stroke="#35b6ff" stroke-width="4" stroke-linecap="round"/>
  <path d="M96 83A37 37 0 0 1 64 101" fill="none" stroke="#e44958" stroke-width="4" stroke-linecap="round"/>
  <path d="M64 38 83 49v30L64 90 45 79V49Z" fill="#0c2034" stroke="url(#edge)" stroke-width="2"/>
  <text x="64" y="70" text-anchor="middle" fill="#fff" font-family="Segoe UI,Arial,sans-serif" font-size="23" font-weight="900" letter-spacing="1">UK</text>
  <circle cx="96" cy="45" r="4" fill="#45c3ff"/>
  <circle cx="32" cy="82" r="4" fill="#ff5965"/>
